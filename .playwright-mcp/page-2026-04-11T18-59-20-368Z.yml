            - generic [ref=e199]: 天王寺やすえ消化器内科・内視鏡クリニックでは、内視鏡検査と無痛診療に力を入れています。特に、胃カメラ検査が苦手な方や緊張しやすい方のために、完全無痛内視鏡検査を実施しています。この検査では、鎮静剤を使用し、リラックスした状態で検査を受けていただけるため、安心して臨むことができます。鎮静剤は患者様の体格や既往歴、アレルギー歴に応じて最低限の量を使用するため、身体への負担も少なく済みます。また、検査中は全身状態を確認しながら進めるため、異変があればすぐに対応可能です。快適で安全な医療を心がけています。
