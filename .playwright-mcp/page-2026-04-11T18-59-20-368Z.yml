              - /url: https://www.tennoji-naishikyo.com/medical_checkupsite/premium-gastroscopy-colonoscopy-doc/
          - text: 本コースでは、
          - strong [ref=e72]: 鎮静剤を使用した苦痛の少ない胃カメラ・大腸カメラ検査をはじめ、
          - strong [ref=e73]: 内視鏡専門医である院長がすべての内視鏡検査を担当
          - text: いたします。
          - text: また、消化器疾患のチェックに加え、
          - text: 生活習慣病や心疾患・肺疾患・甲状腺疾患、がんに関する検査など、
          - strong [ref=e74]: 全身の健康状態を総合的に確認できる充実した検査内容を、リーズナブルに組み合わせた人間ドックコース
          - text: となっています。
          - text: 「せっかく人間ドックを受けるなら、精度の高い検査を受けたい」
          - text: 「将来の安心につながる検査を、しっかり受けておきたい」
          - text: という方に、特にご好評をいただいております。
          - text: 胃と大腸を
          - strong [ref=e75]: 同日に検査できるため、通院回数や時間的な負担を抑えられる点
          - text: も、このコースが選ばれている理由の一つです。
          - text: 人間ドックのコース選びに迷われている方は、ぜひご検討ください。
          - text: 内容や検査の流れについてご不明な点がございましたら、どうぞお気軽にスタッフまでお声がけください。
      - generic [ref=e78]:
        - paragraph [ref=e79]:
          - strong [ref=e80]: マスクご持参のお願いと有料配布について
        - paragraph [ref=e81]:
          - text: 当院では引き続き、ご来院時のマスク着用をお願いしております。 これまでマスクをお持ちでない方には1枚50円で配布しておりましたが、 患者さまの経済的ご負担を考慮し、
          - strong [ref=e82]: 2025年11月より1枚20円へと価格を見直すことといたしました。
          - text: 今後も安心してご受診いただける環境づくりに努めてまいりますので、 引き続きマスクのご持参にご協力いただきますようお願い申し上げます。
      - generic [ref=e85]:
        - paragraph [ref=e86]:
          - strong [ref=e87]: 診療対象年齢について
        - paragraph [ref=e88]:
          - text: 当院では、15歳以上の方を対象に診療を行っております。
          - text: 中学生以下の小児の方の診察には対応しておりませんので、あらかじめご了承いただきますようお願いいたします。
          - text: ご不明な点がございましたら、お気軽にお問い合わせください。
      - generic [ref=e91]:
        - paragraph [ref=e92]:
          - strong [ref=e93]: 当院の診療内容についてのご案内
        - paragraph [ref=e94]:
          - text: 当院は、消化器内科・内視鏡内科・肛門内科に特化した専門クリニックです。
          - text: そのため、一般内科全般（感冒症状のみの診療や高血圧・糖尿病などの生活習慣病の継続管理のみを目的とした受診）については、原則として行っておりません。
          - text: 恐れ入りますが、上記の診療をご希望の方は、かかりつけ医または総合内科標榜の医療機関へのご相談をお願い申し上げます。
          - text: 専門性を活かし、質の高い消化器診療を提供するための体制となっております。何卒ご理解のほどよろしくお願いいたします。
