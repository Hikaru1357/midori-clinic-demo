            - generic [ref=e215]: 天王寺やすえ消化器内科・内視鏡クリニックでは、天王寺にて大腸カメラ検査を実施しています。大腸カメラ検査は、先端にカメラを装備したスコープをおしりから挿入し、大腸粘膜の状態をリアルタイムで観察する信頼性の高い検査です。日本有数の症例数を誇るがん専門病院で培った経験を持つ専門医が、検査と治療を担当しています。鎮静剤を用いた快適な検査にも対応しており、炭酸ガスを使用することで、検査後のお腹の張りを軽減できます。大腸がんを含む大腸疾患の多くは無症状で進行するため、定期的な検査が重要です。患者様の健康を心がけています。
