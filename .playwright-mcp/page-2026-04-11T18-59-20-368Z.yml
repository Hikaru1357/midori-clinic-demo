            - generic [ref=e203]: 【大腸ポリープは早期発見・早期治療が重要です】 大阪・天王寺で大腸ポリープや大腸がんの早期発見をご希望の方は、内視鏡専門医による大腸カメラ検査をご検討ください。 大腸ポリープは多くの場合自覚症状がありませんが、一部は将来的に大腸がんへ進展する可能性があります。 大腸内視鏡検査では、ポリープの発見だけでなくその場で切除できる場合もあります。 天王寺駅徒歩1分の天王寺やすえ消化器内科・内視鏡クリニック（大阪）では、苦痛に配慮した大腸カメラ検査・治療を行っています。 以下のような症状がある方はご相談ください。 ・血便 ・便潜血検査陽性 ・便が細い ・便秘や下痢が続く ・大腸がんが心配 大阪・天王寺で大腸ポリープや大腸がんの検査をご希望の方は、お気軽にご相談ください。
