            - generic [ref=e231]: 天王寺やすえ消化器内科・内視鏡クリニックでは、安心して胃カメラ検査を受けられる環境を整えています。当院の胃カメラ検査は、カメラ付きのスコープを口または鼻から挿入し、食道や胃、十二指腸をリアルタイムで観察します。鎮静剤を使用し、リラックスした状態で検査を行うため、ウトウトとした間に終了します。検査後はストレッチャーでリカバリールームへ移動し、ゆっくりとお休みいただける体制を整えています。経鼻内視鏡と経口内視鏡の選択肢があり、患者様の希望に応じた検査方法を提案いたします。患者様の安心を大切にしています。
