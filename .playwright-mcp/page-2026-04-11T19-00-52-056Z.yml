              - generic [ref=e390]:
                - paragraph [ref=e391]:
                  - text: がんで悲しむ人、
                  - text: ご家族を一人でも少なくするために、
                  - text: 自分ができることを全うしたい
                - paragraph [ref=e392]:
                  - text: 胃カメラ検査や大腸カメラ検査が消化器がんを早期発見するための重要な検査であることが、少しずつですが認知されるようになりました。
                  - text: しかし、まだまだ「痛い」「こわい」といった理由で内視鏡検査を躊躇う人が少なくありません。大阪なんば内科・消化器内視鏡クリニックでは、ほとんど苦痛、恐怖感なく受けられる鎮静剤を用いた内視鏡検査を行っております。また最新の内視鏡システムの導入、日帰りでの大腸ポリープ切除対応、感染症対策の徹底など、誰もが安心して通えるクリニックとしての準備を整えました。
                  - text: これまで受診を躊躇っていた人が気軽に相談できる、信頼して任せられるクリニックでありたいと考えております。どうぞ、よろしくお願いいたします。
